name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release with full notes from commit bodies since the previous tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then echo "release $TAG already exists"; exit 0; fi
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          RANGE="$TAG"; [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          # We squash-merge the dev→main PR, so the squash commit's BODY carries every dev commit's full
          # message (the real per-change detail). `--generate-notes` only listed the one PR title → thin,
          # inaccurate notes. Build the body from the commit bodies in this range instead, dropping the
          # co-author trailer noise. Fall back to --generate-notes only if that comes out empty.
          git log "$RANGE" --no-merges --pretty=format:'%b' | grep -viE '^Co-Authored-By:' > notes.md || true
          if [ -n "$PREV" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' "$GITHUB_REPOSITORY" "$PREV" "$TAG" >> notes.md
          fi
          if [ -s notes.md ]; then
            gh release create "$TAG" --notes-file notes.md --title "$TAG"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
