name: test
# Run on PRs and on pushes to main only. This avoids the double run you get when a feature-branch
# push and its PR both fire, and skips redundant runs on tag pushes (release.yml / npm-publish.yml
# handle tags; main already passed CI before tagging).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ["18", "20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - name: CLI runs dependency-free
        run: node server/cli.js config
      - name: Eval (token-reduction + file:line shape gate, mock LSP — no toolchain)
        run: node eval/run.mjs
      - name: Edit-steer verification (EDIT_STEER placement + discover edit-habit exactness)
        run: node eval/test-edit-steer.mjs
      - name: SkillOpt scorer + gate self-test
        run: node eval/skillopt/selftest.mjs
      - name: Install MCP server deps
        working-directory: server
        run: npm install --no-audit --no-fund
      # The eval above runs BEFORE this install ON PURPOSE (it proves the core works dependency-free). But that
      # means tree-sitter is absent there, so guard 81 — the whole SYNTACTIC tier, 36 languages — self-skips and
      # prints a PASS. CI was therefore never testing that tier at all, which is how a grammar that silently
      # drops declarations survived to 1.0. Run the eval a SECOND time now that the deps exist, so the tier is
      # actually exercised. Cheap (mock LSP, no toolchain) and the only place it gets covered.
      - name: Eval again WITH deps (exercises the tree-sitter SYNTACTIC tier the dep-free run skips)
        run: node eval/run.mjs
      - name: MCP server boots + lists tools
        shell: bash
        run: node server/index.js < .github/smoke/mcp-init.jsonl

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Install dev tooling
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npx eslint .

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifests (directory-submission gate)
        run: claude plugin validate . --strict
